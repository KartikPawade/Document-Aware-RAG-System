# ─────────────────────────────────────────────────────────────────
# docker-compose.infra.yml
#
# Infrastructure ONLY — Qdrant, PostgreSQL, MinIO, Redis,
# Kafka, Prometheus, Grafana.
#
# Your Python services (API + ingestion) run locally with uvicorn
# so code changes take effect instantly with no image rebuild.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml down
# ─────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  rag_network:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
  minio_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  prometheus_data:
  grafana_data:

services:

  # ─────────────────────────────────────────────
  # Vector Database — Qdrant
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: rag_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API  → localhost:6333
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
      - ./configs/qdrant.yaml:/qdrant/config/production.yaml
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Relational Database — PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"   # → localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Object Store — MinIO (S3-compatible)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    container_name: rag_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API    → localhost:9000
      - "9001:9001"   # Console → http://localhost:9001
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create buckets on first start
  minio_init:
    image: minio/mc:latest
    container_name: rag_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/rag-documents;
      mc mb --ignore-existing local/rag-processed;
      echo 'MinIO buckets ready';
      "
    networks:
      - rag_network

  # ─────────────────────────────────────────────
  # Cache — Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # → localhost:6379
    volumes:
      - redis_data:/data
      - ./configs/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Message Queue — Kafka + Zookeeper
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: rag_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    networks:
      - rag_network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: rag_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # → localhost:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # localhost:9092  used by your local Python code
      # kafka:29092     used by services inside Docker network
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Monitoring — Prometheus
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rag_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"   # → http://localhost:9090
    volumes:
      - prometheus_data:/prometheus
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - rag_network

  # ─────────────────────────────────────────────
  # Monitoring — Grafana
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: rag_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"   # → http://localhost:3000  admin/admin123
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - rag_network